name: DOCKER BUILD SCAN PUSH
# Reusable workflow: build a Docker image, scan it with Amazon Inspector (CodeInspector),
# then push it to ECR. Flow is build (local, --load) -> scan -> push, so the image is
# scanned before it is published. The scan is reporting-only by default (all severity
# thresholds default to 0 = disabled); set a threshold > 0 to fail the build on findings.

on:
  workflow_call:
    inputs:
      ecr_repository:
        description: 'ECR repository name to build/scan/push (repo name only, not the full URI)'
        required: true
        type: string
      aws_region:
        description: 'AWS region of the target ECR registry'
        default: 'eu-central-2'
        required: false
        type: string
      runner:
        description: 'Runner to build on (use an arm runner for linux/arm64 images)'
        default: 'ubuntu-24.04-arm'
        required: false
        type: string
      dockerfile:
        description: 'Path to the Dockerfile'
        default: 'Dockerfile'
        required: false
        type: string
      build_context:
        description: 'Docker build context'
        default: '.'
        required: false
        type: string
      platform:
        description: 'Target build platform'
        default: 'linux/arm64'
        required: false
        type: string
      image_tag:
        description: 'Image tag to use. Defaults to the 8-character short commit SHA when empty.'
        default: ''
        required: false
        type: string
      push:
        description: 'Push the image to ECR after a successful build (and scan)'
        default: true
        required: false
        type: boolean
      skip_if_exists:
        description: 'Skip build/scan/push (and report skipped=true) if an image with the computed tag already exists in ECR'
        default: false
        required: false
        type: boolean
      force_rebuild:
        description: 'Build/scan/push even if the tag already exists in ECR (overrides skip_if_exists)'
        default: false
        required: false
        type: boolean
      scan:
        description: 'Run an Amazon Inspector (CodeInspector) vulnerability scan before pushing'
        default: true
        required: false
        type: boolean
      scan_display_findings:
        description: 'Show detailed scan findings in the job summary ("enabled" or "disabled")'
        default: 'enabled'
        required: false
        type: string
      critical_threshold:
        description: 'Fail the build when critical vulnerabilities reach this count (0 = reporting-only, never fails)'
        default: 0
        required: false
        type: number
      high_threshold:
        description: 'Fail the build when high vulnerabilities reach this count (0 = reporting-only)'
        default: 0
        required: false
        type: number
      medium_threshold:
        description: 'Fail the build when medium vulnerabilities reach this count (0 = reporting-only)'
        default: 0
        required: false
        type: number
      low_threshold:
        description: 'Fail the build when low vulnerabilities reach this count (0 = reporting-only)'
        default: 0
        required: false
        type: number
      artifact_retention_days:
        description: 'Retention in days for the uploaded scan report artifact'
        default: 90
        required: false
        type: number
    secrets:
      AWS_ROLE_ARN:
        description: 'OIDC role ARN to assume for ECR login/push and scanning in the target account'
        required: true
    outputs:
      image_tag:
        description: 'The image tag that was built (or that already existed when skipped)'
        value: ${{ jobs.build.outputs.image_tag }}
      image_uri:
        description: 'The full image URI (registry/repo:tag)'
        value: ${{ jobs.build.outputs.image_uri }}
      skipped:
        description: 'true if build/scan/push was skipped because the image tag already existed'
        value: ${{ jobs.build.outputs.skipped }}

permissions:
  id-token: write
  contents: read

jobs:
  build:
    name: Build, Scan and Push
    runs-on: ${{ inputs.runner }}
    outputs:
      image_tag: ${{ steps.build.outputs.image_tag }}
      image_uri: ${{ steps.build.outputs.image_uri }}
      skipped: ${{ steps.build.outputs.skipped }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: isceco/github-workflows/.github/actions/aws/configure_credentials@v1
        with:
          AWS_ROLE_ARN_TO_ASSUME: ${{ secrets.AWS_ROLE_ARN }}
          AWS_REGION: ${{ inputs.aws_region }}
          AWS_SESSION_NAME: GitHubActions-BuildScanPush-${{ github.run_id }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image (local)
        id: build
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          IMAGE_TAG="${{ inputs.image_tag }}"
          if [ -z "${IMAGE_TAG}" ]; then
            IMAGE_TAG="${GITHUB_SHA::8}"
          fi
          IMAGE_URI="${ECR_REGISTRY}/${{ inputs.ecr_repository }}:${IMAGE_TAG}"
          echo "image_tag=${IMAGE_TAG}" >> $GITHUB_OUTPUT
          echo "image_uri=${IMAGE_URI}" >> $GITHUB_OUTPUT

          if [ "${{ inputs.force_rebuild }}" = "true" ]; then
            echo "Force rebuild enabled — building even if the tag already exists in ECR"
          elif [ "${{ inputs.skip_if_exists }}" = "true" ] && \
               aws ecr describe-images \
                 --repository-name "${{ inputs.ecr_repository }}" \
                 --image-ids imageTag="${IMAGE_TAG}" \
                 --region "${{ inputs.aws_region }}" > /dev/null 2>&1; then
            echo "Image ${{ inputs.ecr_repository }}:${IMAGE_TAG} already exists in ECR — skipping build, scan and push"
            echo "skipped=true" >> $GITHUB_OUTPUT
            exit 0
          fi
          echo "skipped=false" >> $GITHUB_OUTPUT

          docker buildx build \
            --platform ${{ inputs.platform }} \
            --tag "${IMAGE_URI}" \
            --load \
            --cache-from type=gha \
            --cache-to type=gha,mode=max \
            --file ${{ inputs.dockerfile }} \
            ${{ inputs.build_context }}

      - name: Export image as tarball for scanning
        id: export
        if: ${{ inputs.scan && steps.build.outputs.skipped != 'true' }}
        run: |
          TARBALL_PATH="./image-${{ inputs.ecr_repository }}-${{ steps.build.outputs.image_tag }}.tar"
          docker save "${{ steps.build.outputs.image_uri }}" -o "${TARBALL_PATH}"
          echo "scan_artifact_path=${TARBALL_PATH}" >> $GITHUB_OUTPUT

      - name: Scan with CodeInspector
        id: inspector
        if: ${{ inputs.scan && steps.build.outputs.skipped != 'true' }}
        uses: aws-actions/vulnerability-scan-github-action-for-amazon-inspector@v1
        with:
          artifact_type: 'container'
          artifact_path: '${{ steps.export.outputs.scan_artifact_path }}'
          display_vulnerability_findings: '${{ inputs.scan_display_findings }}'
          critical_threshold: ${{ inputs.critical_threshold }}
          high_threshold: ${{ inputs.high_threshold }}
          medium_threshold: ${{ inputs.medium_threshold }}
          low_threshold: ${{ inputs.low_threshold }}

      - name: Display scan results
        if: ${{ always() && inputs.scan && steps.build.outputs.skipped != 'true' }}
        run: |
          echo "## CodeInspector Scan Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -f "${{ steps.inspector.outputs.inspector_scan_results_markdown }}" ]; then
            cat "${{ steps.inspector.outputs.inspector_scan_results_markdown }}" >> $GITHUB_STEP_SUMMARY
          else
            echo "No vulnerabilities found or report not available." >> $GITHUB_STEP_SUMMARY
          fi

      - name: Upload scan reports
        if: ${{ always() && inputs.scan && steps.build.outputs.skipped != 'true' }}
        uses: actions/upload-artifact@v4
        with:
          name: security-scan-reports-${{ steps.build.outputs.image_tag }}
          path: |
            ${{ steps.inspector.outputs.artifact_sbom }}
            ${{ steps.inspector.outputs.inspector_scan_results }}
            ${{ steps.inspector.outputs.inspector_scan_results_csv }}
            ${{ steps.inspector.outputs.inspector_scan_results_markdown }}
          retention-days: ${{ inputs.artifact_retention_days }}
          if-no-files-found: ignore

      - name: Push image to ECR
        if: ${{ inputs.push && steps.build.outputs.skipped != 'true' }}
        run: |
          docker push "${{ steps.build.outputs.image_uri }}"
