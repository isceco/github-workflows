name: ECS Smoke Test
description: Wait for an ECS deployment to stabilize on the expected image and verify the service is healthy via target group health check

inputs:
  aws-role-arn:
    description: AWS OIDC role ARN for the target environment
    required: true
  aws-region:
    description: AWS region
    required: true
  ecs-cluster:
    description: ECS cluster name
    required: true
  ecs-service:
    description: ECS service name
    required: true
  ssm-domain:
    description: SSM parameter name for the primary domain
    required: true
  target-group-name:
    description: ALB target group name
    required: true
  expected-image-tag:
    description: >-
      Image tag that must be live in the ECS service's PRIMARY deployment before the smoke
      test passes. When set, the action waits until the primary task definition's container
      image ends with this tag, so it cannot pass against a still-stable old deployment that
      hasn't been replaced yet. Leave empty to only check current stability (legacy behavior,
      not recommended when the deploy is asynchronous).
    required: false
    default: ''

outputs:
  domain:
    description: The primary domain from SSM
    value: ${{ steps.domain.outputs.domain }}

runs:
  using: composite
  steps:
    - name: Configure AWS credentials
      uses: isceco/github-workflows/.github/actions/aws/configure_credentials@v1
      with:
        AWS_ROLE_ARN_TO_ASSUME: ${{ inputs.aws-role-arn }}
        AWS_REGION: ${{ inputs.aws-region }}
        AWS_SESSION_NAME: SmokeTest-${{ github.run_id }}

    - name: Wait for ECS service to stabilize
      shell: bash
      run: |
        echo "=== Waiting for deployment ==="
        EXPECTED_TAG="${{ inputs.expected-image-tag }}"
        if [ -n "$EXPECTED_TAG" ]; then
          echo "Expecting image tag '${EXPECTED_TAG}' to be live in the primary deployment"
        else
          echo "::warning::No expected-image-tag provided — only checking current service stability, not that the new image actually rolled out"
        fi

        # Surface credential/authorization failures immediately instead of silently looping
        # for the full timeout. Not-found errors (cluster/service not created yet) are NOT
        # matched here, so the first-deploy "waiting for creation" path still works.
        fail_fast_on_auth_error() {
          if printf '%s' "$1" | grep -qiE 'AccessDenied|is not authorized|UnauthorizedOperation|ExpiredToken|InvalidClientTokenId|UnrecognizedClient|security token|SignatureDoesNotMatch|RequestExpired'; then
            echo "::error::AWS call failed with an authentication/authorization error:"
            printf '%s\n' "$1"
            exit 1
          fi
        }

        for _ in $(seq 1 60); do
          # Check if cluster and service exist yet (first deployment — terraform may still be applying)
          ERR_FILE="$(mktemp)"
          SERVICE_JSON=$(aws ecs describe-services \
            --cluster ${{ inputs.ecs-cluster }} \
            --services ${{ inputs.ecs-service }} \
            --region ${{ inputs.aws-region }} \
            --query 'services[0]' \
            --output json 2>"$ERR_FILE") || true
          SERVICE_ERR="$(cat "$ERR_FILE")"; rm -f "$ERR_FILE"
          fail_fast_on_auth_error "$SERVICE_ERR"

          if [ -z "$SERVICE_JSON" ] || [ "$SERVICE_JSON" = "null" ]; then
            echo "[$(date +%H:%M:%S)] Waiting for service to be created...${SERVICE_ERR:+ (last error: ${SERVICE_ERR})}"
            sleep 15
            continue
          fi

          STATUS=$(echo "$SERVICE_JSON" | jq -r '.status // "unknown"')
          if [ "$STATUS" = "INACTIVE" ] || [ "$STATUS" = "unknown" ]; then
            echo "[$(date +%H:%M:%S)] Service not active yet (status: ${STATUS})..."
            sleep 15
            continue
          fi

          RUNNING=$(echo "$SERVICE_JSON" | jq -r '.runningCount')
          DESIRED=$(echo "$SERVICE_JSON" | jq -r '.desiredCount')
          PENDING=$(echo "$SERVICE_JSON" | jq -r '.pendingCount')
          TASK_DEF=$(echo "$SERVICE_JSON" | jq -r '.taskDefinition | split("/")[-1]')
          ROLLOUT=$(echo "$SERVICE_JSON" | jq -r '.deployments[0].rolloutState // "unknown"')
          NUM_DEPLOYMENTS=$(echo "$SERVICE_JSON" | jq -r '.deployments | length')

          # Anchor on the deployed version: verify the PRIMARY deployment's task definition
          # runs the expected image tag. Without this, a still-stable OLD deployment satisfies
          # the completion check before the new rollout has even started — the deploy step only
          # pushes a tfvars commit, and the ECS update happens asynchronously in the infra
          # repo's terraform apply.
          IMAGE_OK=true
          RUNNING_TAG=""
          if [ -n "$EXPECTED_TAG" ]; then
            IMAGE_OK=false
            PRIMARY_TD=$(echo "$SERVICE_JSON" | jq -r '(.deployments[] | select(.status=="PRIMARY") | .taskDefinition) // empty')
            if [ -n "$PRIMARY_TD" ]; then
              TD_ERR_FILE="$(mktemp)"
              RUNNING_IMAGES=$(aws ecs describe-task-definition \
                --task-definition "$PRIMARY_TD" \
                --query 'taskDefinition.containerDefinitions[].image' \
                --output text \
                --region ${{ inputs.aws-region }} 2>"$TD_ERR_FILE") || true
              TD_ERR="$(cat "$TD_ERR_FILE")"; rm -f "$TD_ERR_FILE"
              fail_fast_on_auth_error "$TD_ERR"
              if echo "$RUNNING_IMAGES" | tr '\t' '\n' | grep -q ":${EXPECTED_TAG}$"; then
                IMAGE_OK=true
              fi
              RUNNING_TAG=$(echo "$RUNNING_IMAGES" | tr '\t' '\n' | sed 's#.*:##' | paste -sd',' -)
            fi
          fi

          echo "[$(date +%H:%M:%S)] Task def: ${TASK_DEF} | Running: ${RUNNING}/${DESIRED} | Pending: ${PENDING} | Rollout: ${ROLLOUT} | Deployments: ${NUM_DEPLOYMENTS} | Image: ${RUNNING_TAG:-n/a} | Expected: ${EXPECTED_TAG:-none} | Match: ${IMAGE_OK}"

          if [ "$ROLLOUT" = "COMPLETED" ] && [ "$RUNNING" = "$DESIRED" ] && [ "$NUM_DEPLOYMENTS" = "1" ] && [ "$IMAGE_OK" = "true" ]; then
            echo "Deployment complete."
            exit 0
          fi
          sleep 15
        done
        echo "Timed out waiting for service to stabilize (15 minutes)"
        exit 1

    - name: Verify target group health
      shell: bash
      run: |
        TG_ARN=$(aws elbv2 describe-target-groups \
          --names "${{ inputs.target-group-name }}" \
          --query 'TargetGroups[0].TargetGroupArn' \
          --output text \
          --region ${{ inputs.aws-region }})

        HEALTHY_COUNT=$(aws elbv2 describe-target-health \
          --target-group-arn "${TG_ARN}" \
          --query 'length(TargetHealthDescriptions[?TargetHealth.State==`healthy`])' \
          --output text \
          --region ${{ inputs.aws-region }})

        if [ "${HEALTHY_COUNT}" = "0" ]; then
          echo "::error::No healthy targets in target group"
          exit 1
        fi
        echo "Healthy targets: ${HEALTHY_COUNT}"

    - name: Get primary domain from SSM
      id: domain
      shell: bash
      run: |
        DOMAIN=$(aws ssm get-parameter \
          --name "${{ inputs.ssm-domain }}" \
          --with-decryption \
          --query 'Parameter.Value' \
          --output text \
          --region ${{ inputs.aws-region }})
        echo "domain=${DOMAIN}" >> $GITHUB_OUTPUT
        echo "Primary domain: ${DOMAIN}"
